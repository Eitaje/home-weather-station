<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EITAJE | OTA Update</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    .ota-wrap   { max-width: 480px; margin: 60px auto; }
    .ota-title  { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 20px; }
    .file-row   { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input[type=file] { font-size: 0.78rem; color: var(--text-muted); flex: 1; }
    .upload-btn {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: #fff; background: var(--accent);
      border: none; border-radius: 8px; padding: 7px 18px;
      cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
    }
    .upload-btn:disabled { opacity: 0.35; cursor: default; }
    .progress-wrap {
      display: none; height: 5px; background: var(--bg);
      border-radius: 3px; overflow: hidden; margin-top: 16px;
    }
    .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.25s; }
    .status-msg {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: var(--text-muted); margin-top: 12px; min-height: 1.2em;
    }
    .countdown  {
      display: none; font-family: var(--font-mono);
      font-size: 2.4rem; color: var(--accent);
      text-align: center; margin: 20px 0 4px;
    }
    .back-link  {
      display: inline-block; margin-top: 22px;
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent);
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<main class="dashboard">
  <div class="card ota-wrap">
    <div class="ota-title">Firmware OTA Update</div>
    <div class="file-row">
      <input type="file" id="firmwareFile" accept=".bin">
      <button class="upload-btn" id="uploadBtn" onclick="startUpload()">Upload</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status-msg"  id="statusMsg"></div>
    <div class="countdown"   id="countdown"></div>
    <a class="back-link" href="/">← Back to dashboard</a>
  </div>
</main>
<!-- SparkMD5: used to compute MD5 hash required by AsyncElegantOTA -->
<script src="https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js"></script>
<script>
var otaDelay = 20; // default; overwritten on load from /ota_delay
window.addEventListener('load', function() {
  var xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function() {
    if (this.readyState === 4 && this.status === 200) {
      var n = parseInt(this.responseText.trim());
      if (n > 0) otaDelay = n;
    }
  };
  xhr.open('GET', '/ota_delay', true);
  xhr.send();
});
function computeMD5(file, onProgress, onDone) {
  var chunkSize = 2 * 1024 * 1024; // 2 MB slices
  var chunks    = Math.ceil(file.size / chunkSize);
  var chunk     = 0;
  var spark     = new SparkMD5.ArrayBuffer();
  var reader    = new FileReader();

  reader.onload = function(e) {
    spark.append(e.target.result);
    chunk++;
    onProgress(Math.round(chunk / chunks * 100));
    if (chunk < chunks) readChunk();
    else onDone(spark.end());
  };

  function readChunk() {
    var start = chunk * chunkSize;
    reader.readAsArrayBuffer(file.slice(start, start + chunkSize));
  }
  readChunk();
}

function startUpload() {
  var file = document.getElementById('firmwareFile').files[0];
  if (!file) { document.getElementById('statusMsg').textContent = 'Select a .bin file first.'; return; }

  var btn          = document.getElementById('uploadBtn');
  var progressWrap = document.getElementById('progressWrap');
  var progressBar  = document.getElementById('progressBar');
  var statusMsg    = document.getElementById('statusMsg');

  btn.disabled = true;
  progressWrap.style.display = 'block';
  statusMsg.textContent = 'Computing MD5…';

  computeMD5(file,
    function(pct) {
      progressBar.style.width = (pct * 0.1) + '%'; // 0–10% for hashing
      statusMsg.textContent = 'Computing MD5… ' + pct + '%';
    },
    function(md5) {
      statusMsg.textContent = 'Uploading…';

      var uploadCompleted = false;
      var xhr = new XMLHttpRequest();
      xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
          var pct = Math.round(e.loaded / e.total * 100);
          progressBar.style.width = (10 + pct * 0.9) + '%'; // 10–100%
          statusMsg.textContent = 'Uploading… ' + pct + '%';
          if (pct === 100) uploadCompleted = true;
        }
      };
      xhr.onload = function() {
        if (xhr.status === 200 && xhr.responseText.trim() !== 'FAIL') {
          progressBar.style.width = '100%';
          statusMsg.textContent = 'Update successful — device is rebooting…';
          startCountdown(otaDelay);
        } else {
          statusMsg.textContent = 'Update failed: ' + xhr.responseText;
          btn.disabled = false;
        }
      };
      xhr.onerror = function() {
        if (uploadCompleted) {
          progressBar.style.width = '100%';
          statusMsg.textContent = 'Update successful — device is rebooting…';
          startCountdown(otaDelay);
        } else {
          statusMsg.textContent = 'Connection error during upload.';
          btn.disabled = false;
        }
      };

      var fd = new FormData();
      fd.append('MD5', md5);
      fd.append('update', file, file.name);
      xhr.open('POST', '/update', true);
      xhr.send(fd);
    }
  );
}

function startCountdown(sec) {
  var el = document.getElementById('countdown');
  el.style.display = 'block';
  el.textContent = sec + 's';
  var t = setInterval(function() {
    sec--;
    el.textContent = sec + 's';
    if (sec <= 0) { clearInterval(t); window.location.href = '/'; }
  }, 1000);
}
</script>
</body>
</html>
