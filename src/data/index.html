<!DOCTYPE html>
<html>
  <head>
    <title>EITAJE GLEEZE DASHBOARD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="http://cdn.rawgit.com/Mikhus/canvas-gauges/gh-pages/download/2.1.7/all/gauge.min.js"></script>
	<style>
		html {font-family: Arial; display: inline-block; text-align: center;}
		h2 {font-size: 3.0rem;}
		p {font-size: 3.0rem;}
		body {max-width: 600px; margin:0px auto; padding-bottom: 25px;}
		.switch {position: relative; display: inline-block; width: 120px; height: 50px}
		.switch input {display: none}
		.slider {position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 24px}
		.slider:before {position: absolute; content: ""; height: 36px; width: 52px; left: 8px; bottom: 8px; background-color: #fff; -webkit-transition: .4s; transition: .4s; border-radius: 40px}
		input:checked+.slider {background-color: #d32121}
		input:checked+.slider:before {-webkit-transform: translateX(52px); -ms-transform: translateX(52px); transform: translateX(52px)}
		.myDiv {border: 5px outset red; background-color: lightblue; text-align: center;
	</style>
  </head>
  <body>
    <div class="topnav">
      <h1>EITAJE SMART HOME SERVER</h1>
    </div>
	
	<div class="myDiv">
	<p  style="font-family:'Courier New';font-size:10px"> server state: <b><span id="serverState"><span></b></p>
	<h3>Boiler is <span id="outputState"><span></h3>
	<label class="switch"><input type="checkbox" onchange="toggleCheckbox(this)" id="output"><span class="slider"></span></label>
	<script>function toggleCheckbox(element) {
		var xhr = new XMLHttpRequest();
		if(element.checked){ xhr.open("GET", "/button_update?state=1", true); }
		else { xhr.open("GET", "/button_update?state=0", true); }
		xhr.send();
		}
	setInterval(function ( ) {
	  var xhttp = new XMLHttpRequest();
	  
	  xhttp.timeout = 2000;
	  xhttp.ontimeout = function (e) {
		// XMLHttpRequest timed out. Do something here.
		document.getElementById("serverState").innerHTML = "offline";
		};
		
	  xhttp.onreadystatechange = function() {
		document.getElementById("serverState").innerHTML = "online";
		if (this.readyState == 4 && this.status == 200) {
		  var inputChecked;
		  var outputStateM;
		  const ans = this.responseText.split(",");
		  if(ans[0] == 1){ 
			inputChecked = true;
			outputStateM = "On - " + ans[1] + " hours";
		  }
		  else { 
			inputChecked = false;
			outputStateM = "Off";
		  }
		  document.getElementById("output").checked = inputChecked;
		  document.getElementById("outputState").innerHTML = outputStateM;
		}
	  };
	  xhttp.open("GET", "/button_state", true);
	  xhttp.send();
	}, 1000 ) ;
	</script>
	<p></p>
	</div>
    <div class="content">
      <div class="card-grid">
        <div class="card">
          <p class="card-title">Tank Temperature</p>
          <canvas id="gauge-water-temperature"></canvas>
        </div>
		<div class="card">
          <p class="card-title">Outside Temperature</p>
          <canvas id="gauge-temperature"></canvas>
        </div>
	 </div>
	 <p></p>
	 <div class="card-grid">
        <div class="card">
          <p class="card-title">Outside Humidity</p>
          <canvas id="gauge-humidity"></canvas>
        </div>
		<div class="card">
          <p class="card-title">Light Intensity</p>
		  <canvas data-type="radial-gauge" id="gauge-light" data-width="250" data-height="250"></canvas>
        </div>
      </div>
      <p></p>
      <div class="card-grid">
        <div class="card">
          <p class="card-title">CO2 (ppm)</p>
          <canvas id="gauge-co2"></canvas>
        </div>
        <div class="card">
          <p class="card-title">VOC (ppb)</p>
          <canvas id="gauge-voc"></canvas>
        </div>
        <div class="card">
          <p class="card-title">Air Quality Index</p>
          <canvas id="gauge-aqi"></canvas>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
